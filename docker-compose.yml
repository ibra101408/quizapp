services:

  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: quizapp-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quizapp}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-quizapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Spring Boot Backend ----
  backend:
    build:
      context: .
    container_name: quizapp-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/quizapp
      DB_USERNAME: ${DB_USERNAME:-quizapp_user}
      DB_PASSWORD: ${DB_PASSWORD:-quizapp_password}
      DB_ADMIN_USERNAME: ${POSTGRES_USER:-postgres}
      DB_ADMIN_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ---- React Frontend ----
  frontend:
    build:
      context: ./frontend
    container_name: quizapp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
