version: '3.8'

services:

  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: quizapp-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Spring Boot Backend ----
  backend:
    build:
      context: .
    container_name: quizapp-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_LIQUIBASE_ENABLED: ${SPRING_LIQUIBASE_ENABLED}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ---- React Frontend ----
  frontend:
    build:
      context: ./frontend
    container_name: quizapp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: