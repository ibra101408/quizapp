spring.application.name=quizapp

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/quizapp}
spring.datasource.username=${DB_USERNAME:quizapp_user}
spring.datasource.password=${DB_PASSWORD:quizapp_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.liquibase.enabled=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Google OAuth2 (leave empty to disable OAuth2 login)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

app.jwt.secret=${JWT_SECRET}
