spring.application.name=quizapp

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/quizapp}
spring.datasource.username=${DB_USERNAME:quizapp_user}
spring.datasource.password=${DB_PASSWORD:quizapp_password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.liquibase.enabled=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Google OAuth2
# To enable: set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET environment variables
# Do NOT add them here with empty defaults — empty string triggers a startup crash
