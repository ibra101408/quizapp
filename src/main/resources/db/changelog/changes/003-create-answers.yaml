databaseChangeLog:
  - changeSet:
      id: 003-create-answers
      author: team35
      changes:
        - createTable:
            tableName: answers
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: question_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_answers_question
                    references: questions(id)
              - column:
                  name: text
                  type: VARCHAR(255)
              - column:
                  name: correct
                  type: BOOLEAN
                  defaultValueBoolean: false
      rollback:
        - dropTable:
            tableName: answers
