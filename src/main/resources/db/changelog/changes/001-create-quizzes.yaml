databaseChangeLog:
  - changeSet:
      id: 001-create-quizzes
      author: team35
      changes:
        - createTable:
            tableName: quizzes
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
      rollback:
        - dropTable:
            tableName: quizzes
