databaseChangeLog:
  - changeSet:
      id: 000-create-app-user
      author: team35
      changes:
        - sql:
            dbms: postgresql
            splitStatements: false   # Prevents breaking the DO block
            stripComments: false     # For dollar quoting
            sql: |
              DO $$BEGIN
                IF NOT EXISTS (SELECT FROM pg_catalog.pg_user WHERE usename = 'quizapp_user') THEN
                  CREATE USER quizapp_user WITH PASSWORD 'quizapp_password';
                END IF;
              END$$;
        - sql:
            sql: GRANT CONNECT ON DATABASE quizapp TO quizapp_user;
        - sql:
            sql: GRANT USAGE ON SCHEMA public TO quizapp_user;
      rollback:
        - sql:
            sql: DROP USER IF EXISTS quizapp_user;