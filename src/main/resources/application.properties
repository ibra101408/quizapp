spring.application.name=quizapp

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/quizapp}
spring.datasource.username=${DB_USERNAME:quizapp_user}
spring.datasource.password=${DB_PASSWORD:quizapp_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.enabled=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
